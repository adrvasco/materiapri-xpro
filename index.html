<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Matéria Prima</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Matéria Prima">
<meta name="theme-color" content="#0f1117">
<link rel="manifest" href="manifest.json">
<style>
  :root{--bg:#0f1117;--surface:#1a1d27;--surface2:#222638;--border:#2e3350;--accent:#4fcf8e;--danger:#f74f6a;--warn:#f7a84f;--ok:#4fcf8e;--text:#e8eaf6;--muted:#7c82a8;--font:'Segoe UI',system-ui,sans-serif}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;padding-bottom:90px}

  header{background:linear-gradient(135deg,#111a14,#1a2720);border-bottom:1px solid var(--border);padding:14px 16px;position:sticky;top:0;z-index:100}
  .header-row{display:flex;justify-content:space-between;align-items:center}
  header h1{font-size:17px;font-weight:700}
  header p{font-size:11px;color:var(--muted);margin-top:2px}
  .sync-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);display:inline-block;margin-right:5px;transition:background .3s}
  .sync-dot.ok{background:var(--ok)}.sync-dot.busy{background:var(--warn);animation:pulse .8s infinite}.sync-dot.err{background:var(--danger)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .badge-critico{background:var(--danger);color:#fff;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px}

  .tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border)}
  .tab{flex:1;padding:10px 2px;font-size:11px;font-weight:600;color:var(--muted);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent)}
  .screen{display:none;padding:12px}.screen.active{display:block}

  /* SUMMARY */
  .summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
  .sum-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px}
  .sum-card .label{font-size:11px;color:var(--muted);margin-bottom:4px}
  .sum-card .value{font-size:22px;font-weight:800}
  .sum-card.ok .value{color:var(--ok)}.sum-card.warn .value{color:var(--warn)}.sum-card.danger .value{color:var(--danger)}.sum-card.accent .value{color:var(--accent)}

  /* ITEM CARD */
  .item-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;position:relative}
  .item-card.alert-baixo{border-left:3px solid var(--warn)}.item-card.alert-falta{border-left:3px solid var(--danger)}
  .item-name{font-size:15px;font-weight:700;margin-bottom:8px;padding-right:64px}
  .item-unit-badge{font-size:10px;font-weight:700;background:rgba(79,207,142,.15);color:var(--accent);padding:2px 7px;border-radius:10px;margin-left:6px;vertical-align:middle}
  .item-total{font-size:24px;font-weight:900;color:var(--accent);margin-bottom:4px}
  .item-total.baixo{color:var(--warn)}.item-total.falta{color:var(--danger)}
  .item-badge{position:absolute;top:12px;right:12px;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px}
  .badge-ok{background:rgba(79,207,142,.15);color:var(--ok)}.badge-baixo{background:rgba(247,168,79,.15);color:var(--warn)}.badge-critico{background:rgba(247,79,106,.15);color:var(--danger)}

  /* LOCAIS GRID */
  .locais-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px}
  .local-cell{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 6px;text-align:center}
  .local-cell .lname{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px}
  .local-cell .lval{font-size:15px;font-weight:800;color:var(--text)}
  .local-cell .lval.zero{color:var(--border)}

  .progress-bar{height:8px;background:var(--border);border-radius:4px;margin-top:8px;overflow:visible;position:relative}
  .progress-fill{height:100%;border-radius:4px;transition:width .4s}
  .progress-min-marker{position:absolute;top:-3px;width:2px;height:14px;background:rgba(255,255,255,0.85);border-radius:2px;transform:translateX(-50%);pointer-events:none}
  .fill-ok{background:var(--ok)}.fill-baixo{background:var(--warn)}.fill-critico{background:var(--danger)}
  .card-actions{display:flex;gap:6px;margin-top:10px}
  .card-btn{flex:1;padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);font-size:12px;font-weight:600;cursor:pointer}
  .card-btn.edit{color:var(--accent);border-color:rgba(79,207,142,.3)}.card-btn.del{color:var(--danger);border-color:rgba(247,79,106,.3)}

  /* URGENT ALERT */
  .urgent-box{background:rgba(247,79,106,.08);border:1px solid rgba(247,79,106,.3);border-radius:10px;padding:12px;margin-bottom:12px}
  .urgent-title{font-size:13px;font-weight:700;color:var(--danger);margin-bottom:8px}

  /* IMPORT */
  .import-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px}
  .import-box label{font-size:11px;color:var(--muted);display:block;margin-bottom:8px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
  textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font);font-size:13px;padding:10px;resize:vertical;min-height:160px;outline:none}
  textarea:focus{border-color:var(--accent)}

  .btn{display:block;width:100%;padding:14px;border-radius:10px;border:none;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .2s;margin-top:10px}
  .btn:active{opacity:.8}.btn-primary{background:var(--accent);color:#0f1117}.btn-danger{background:var(--danger);color:#fff}.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}

  .parse-preview{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;margin-top:10px;font-size:13px;display:none}
  .parse-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);gap:8px}
  .parse-row:last-child{border-bottom:none}
  .parse-row .pname{color:var(--text);flex:1}.parse-row .pqty{color:var(--accent);font-weight:700;white-space:nowrap}

  .hist-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px}
  .hist-date{font-size:12px;color:var(--muted);margin-bottom:4px}
  .hist-title{font-size:14px;font-weight:700;color:var(--accent);margin-bottom:4px}
  .hist-count{font-size:12px;color:var(--muted)}

  .section-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:16px 0 8px}
  .empty-state{text-align:center;color:var(--muted);padding:40px 20px;font-size:14px}
  .search-bar{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--font);font-size:14px;padding:11px 14px;outline:none;margin-bottom:12px}
  .search-bar:focus{border-color:var(--accent)}
  .filter-row{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;padding-bottom:4px}
  .filter-btn{background:var(--surface);border:1px solid var(--border);color:var(--muted);font-size:12px;font-weight:600;padding:6px 12px;border-radius:20px;cursor:pointer;white-space:nowrap}
  .filter-btn.active{background:var(--accent);border-color:var(--accent);color:#0f1117}

  .fab{position:fixed;bottom:20px;right:20px;width:56px;height:56px;border-radius:50%;background:var(--accent);color:#0f1117;font-size:28px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(79,207,142,.4);z-index:200;transition:transform .15s}
  .fab:active{transform:scale(.92)}

  /* MODAL */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;align-items:flex-end;justify-content:center}
  .modal-overlay.open{display:flex}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:16px 16px 0 0;padding:20px 16px 32px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
  .modal-title{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
  .modal-close{background:var(--surface2);border:none;color:var(--muted);font-size:18px;width:32px;height:32px;border-radius:50%;cursor:pointer}
  .field-group{margin-bottom:12px}
  .field-group label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px}
  .field-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font);font-size:15px;padding:11px 12px;outline:none}
  .field-input:focus{border-color:var(--accent)}
  .field-row-3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .field-row-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .locais-divider{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:14px 0 10px;padding-top:10px;border-top:1px solid var(--border)}

  /* CHARTS */
  .chart-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px}
  .chart-title{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
  .bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .bar-label{font-size:12px;color:var(--text);width:130px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bar-wrap{flex:1;background:var(--border);border-radius:4px;height:20px;overflow:hidden}
  .bar-fill{height:100%;border-radius:4px;transition:width .5s}
  .bar-val{font-size:11px;font-weight:700;color:var(--text);white-space:nowrap;width:60px;text-align:right;flex-shrink:0}
  .donut-wrap{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .donut-legend{display:flex;flex-direction:column;gap:6px}
  .legend-item{display:flex;align-items:center;gap:6px;font-size:12px}
  .legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

  .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--surface2);color:var(--text);padding:12px 20px;border-radius:30px;font-size:13px;font-weight:600;border:1px solid var(--border);z-index:999;opacity:0;transition:opacity .3s;white-space:nowrap}
  .toast.show{opacity:1}

  /* LOG */
  .log-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .log-info .log-name{font-size:14px;font-weight:700}
  .log-info .log-time{font-size:11px;color:var(--muted);margin-top:2px}
  .log-info .log-detail{font-size:12px;color:var(--muted);margin-top:3px}
  .log-delta{font-size:18px;font-weight:900;white-space:nowrap}
  .log-delta.pos{color:var(--ok)}.log-delta.neg{color:var(--danger)}.log-delta.neu{color:var(--muted)}

  /* SNAPSHOTS */
  .snap-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px}
  .snap-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .snap-title{font-size:14px;font-weight:700;color:var(--accent)}
  .snap-date{font-size:11px;color:var(--muted)}
  .snap-delete{background:none;border:none;color:var(--danger);font-size:18px;cursor:pointer;padding:0}
  .snap-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);font-size:13px}
  .snap-row:last-child{border-bottom:none}
  .snap-row .sname{color:var(--text);flex:1}
  .snap-row .sval{color:var(--muted);white-space:nowrap}
  .snap-row .sdiff{font-weight:700;white-space:nowrap;margin-left:8px}
  .sdiff.pos{color:var(--ok)}.sdiff.neg{color:var(--danger)}
</style>
</head>
<body>

<header>
  <div class="header-row">
    <div>
      <h1>🧪 Matéria Prima</h1>
      <p><span class="sync-dot" id="syncDot"></span><span id="syncStatus">Conectando...</span></p>
    </div>
    <span class="badge-critico" id="criticoBadge" style="display:none"></span>
  </div>
  <div id="lastModBar" style="display:none;font-size:11px;color:var(--muted);margin-top:6px;padding-top:6px;border-top:1px solid var(--border)">
    ✏️ Última alteração: <span id="lastModText" style="color:var(--accent)"></span>
  </div>
</header>

<div class="tabs">
  <button class="tab active" onclick="showTab('estoque',this)">Estoque</button>
  <button class="tab" onclick="showTab('critico',this)">Crítico</button>
  <button class="tab" onclick="showTab('graficos',this)">Gráficos</button>
  <button class="tab" onclick="showTab('log',this)">Log</button>
  <button class="tab" onclick="showTab('snapshots',this)">Snapshots</button>
</div>

<!-- ESTOQUE -->
<div id="tab-estoque" class="screen active">
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <button class="btn btn-secondary" style="margin-top:0;flex:1;padding:10px" onclick="openImportPanel()">📥 Importar WA</button>
    <button class="btn btn-secondary" style="margin-top:0;flex:1;padding:10px" onclick="openConfigPanel()">⚙️ Config</button>
  </div>
  <div id="urgentAlert" style="display:none" class="urgent-box">
    <div class="urgent-title">🚨 Reposição Urgente</div>
    <div id="urgentList"></div>
  </div>
  <input class="search-bar" type="text" placeholder="🔍  Buscar matéria prima..." id="searchInput">
  <div class="filter-row" id="statusFilterRow">
    <button class="filter-btn active" onclick="setFilter('todos',this)">Todos</button>
    <button class="filter-btn" onclick="setFilter('ok',this)">OK</button>
    <button class="filter-btn" onclick="setFilter('baixo',this)">Baixo</button>
    <button class="filter-btn" onclick="setFilter('critico',this)">Crítico</button>
  </div>
  <div class="filter-row" id="localFilterRow">
    <button class="filter-btn active" onclick="setLocalFilter('todos',this)">📍 Todos</button>
    <button class="filter-btn" onclick="setLocalFilter('caxias',this)">Caxias</button>
    <button class="filter-btn" onclick="setLocalFilter('sjm',this)">SJM</button>
    <button class="filter-btn" onclick="setLocalFilter('galpao',this)">Galpão</button>
  </div>
  <div class="summary-grid" id="summaryGrid"></div>
  <div id="itemList"></div>
</div>

<!-- CRÍTICO -->
<div id="tab-critico" class="screen"><div id="criticoContent"></div></div>

<!-- GRÁFICOS -->
<div id="tab-graficos" class="screen"><div id="chartContainer"></div></div>

<!-- LOG -->
<div id="tab-log" class="screen"><div id="logContent"></div></div>

<!-- SNAPSHOTS -->
<div id="tab-snapshots" class="screen">
  <div class="import-box">
    <label>📸 Tirar snapshot agora</label>
    <p style="font-size:13px;color:var(--muted);margin-bottom:10px">Salva o estado atual com data e hora automáticas. Recomendado na segunda, quarta e sexta.</p>
    <button class="btn btn-primary" onclick="takeSnapshot()">📸 Salvar snapshot agora</button>
  </div>
  <div id="snapshotAnalysis"></div>
</div>

<!-- IMPORTAR (moved to bottom, accessible via long-press or settings) -->
<div id="tab-importar" class="screen" style="display:none">
  <div class="import-box">
    <label>Colar mensagem do WhatsApp</label>
    <textarea id="waText" placeholder="Cole aqui a mensagem do WhatsApp com o inventário...&#10;&#10;Formatos aceitos:&#10;Sal 850kg&#10;Álcool ceto 173,kg&#10;Essência 11.200,kg"></textarea>
    <div class="field-group" style="margin-top:10px">
      <label>Local de destino</label>
      <select class="field-input" id="importLocal">
        <option value="caxias">Caxias</option>
        <option value="sjm">SJM</option>
        <option value="galpao">Galpão Vermelho</option>
      </select>
    </div>
    <button class="btn btn-secondary" onclick="previewParse()">👁 Pré-visualizar</button>
    <div class="parse-preview" id="parsePreview"></div>
    <button class="btn btn-primary" onclick="importData()">✅ Importar inventário</button>
  </div>
  <div class="import-box">
    <label>Backup</label>
    <button class="btn btn-secondary" onclick="exportExcel()">📊 Exportar para Excel</button>
  </div>
  <div class="import-box">
    <label>Danger zone</label>
    <button class="btn btn-danger" onclick="clearAll()">🗑 Apagar todos os dados</button>
  </div>
</div>

<!-- HISTÓRICO (kept for legacy) -->
<div id="tab-historico" class="screen" style="display:none"><div id="histContent"></div></div>

<!-- CONFIG (hidden) -->
<div id="tab-config" class="screen" style="display:none">
  <div class="import-box">
    <label>🔔 Alerta WhatsApp</label>
    <p style="font-size:13px;color:var(--muted);margin-bottom:10px">Receba alertas quando matérias-primas estiverem abaixo do mínimo.</p>
    <div class="field-group">
      <label>Número WhatsApp (com DDI)</label>
      <input class="field-input" id="configPhone" type="tel" inputmode="numeric" placeholder="5521999999999">
    </div>
    <div class="field-group">
      <label>ApiKey CallMeBot</label>
      <input class="field-input" id="configApiKey" type="text" placeholder="Ex: 8623927">
    </div>
    <button class="btn btn-primary" onclick="saveAlertConfig()">💾 Salvar configuração</button>
    <button class="btn btn-secondary" style="margin-top:8px" onclick="testAlert()">🧪 Testar alerta</button>
    <button class="btn btn-secondary" style="margin-top:8px" onclick="sendStockAlert()">📢 Enviar alerta agora</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<button class="fab" id="fabBtn" onclick="openModal()">+</button>

<!-- MODAL ADD/EDIT -->
<div class="modal-overlay" id="modalOverlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-title">
      <span id="modalTitle">Nova matéria prima</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="field-row-2">
      <div class="field-group">
        <label>Nome</label>
        <input class="field-input" id="fieldName" type="text" placeholder="Ex: Sal">
      </div>
      <div class="field-group">
        <label>Unidade</label>
        <select class="field-input" id="fieldUnit">
          <option value="kg">kg</option>
          <option value="L">Litros</option>
          <option value="g">g</option>
          <option value="ml">ml</option>
          <option value="un">un</option>
        </select>
      </div>
    </div>
    <div class="field-group">
      <label>Mínimo (alerta)</label>
      <input class="field-input" id="fieldMin" type="number" inputmode="decimal" placeholder="0" min="0" step="0.1">
    </div>
    <div class="locais-divider">Quantidade por local</div>
    <div class="field-row-3">
      <div class="field-group">
        <label>Caxias</label>
        <input class="field-input" id="fieldCaxias" type="number" inputmode="decimal" placeholder="0" min="0" step="0.1" oninput="updateModalTotal()">
      </div>
      <div class="field-group">
        <label>SJM</label>
        <input class="field-input" id="fieldSjm" type="number" inputmode="decimal" placeholder="0" min="0" step="0.1" oninput="updateModalTotal()">
      </div>
      <div class="field-group">
        <label>Galpão</label>
        <input class="field-input" id="fieldGalpao" type="number" inputmode="decimal" placeholder="0" min="0" step="0.1" oninput="updateModalTotal()">
      </div>
    </div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:12px">Total: <span id="modalTotal" style="color:var(--accent);font-weight:700">0</span></div>
    <button class="btn btn-primary" onclick="saveItem()">Salvar</button>
    <button class="btn btn-danger" id="deleteBtn" onclick="deleteItem()" style="display:none;margin-top:8px">🗑 Excluir</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBEQ0pAsCBdDbo2RwcQlmD3jx6HteKfNC4",
  authDomain: "folha-de-ponto-xpro.firebaseapp.com",
  databaseURL: "https://folha-de-ponto-xpro-default-rtdb.firebaseio.com",
  projectId: "folha-de-ponto-xpro",
  storageBucket: "folha-de-ponto-xpro.firebasestorage.app",
  messagingSenderId: "988072192165",
  appId: "1:988072192165:web:590e4f9ff775bb18a2454c"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const DB_PATH = 'estoqueMateriaPrima';

let state = { items:[], history:[], log:[], snapshots:[], lastModified:null };
let activeFilter = 'todos';
let activeLocalFilter = 'todos';
let editingIndex = null;

function addLog(action, name, before, after, unit) {
  if (!state.log) state.log = [];
  state.log.unshift({ action, name, before, after, unit: unit||'kg', at: new Date().toISOString() });
  if (state.log.length > 200) state.log = state.log.slice(0, 200);
  state.lastModified = new Date().toISOString();
}

function updateLastModBar() {
  const bar = document.getElementById('lastModBar');
  const txt = document.getElementById('lastModText');
  if (!bar || !txt) return;
  if (state.lastModified) {
    const dt = new Date(state.lastModified);
    const label = dt.toLocaleDateString('pt-BR') + ' às ' + dt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    txt.textContent = label;
    bar.style.display = 'block';
  } else {
    bar.style.display = 'none';
  }
}

// ─── HELPERS ─────────────────────────────────────────────
function itemTotal(item) { return (item.caxias||0)+(item.sjm||0)+(item.galpao||0); }
function fmt(v, unit) {
  const n = parseFloat(v)||0;
  return n % 1 === 0 ? n.toLocaleString('pt-BR') : n.toLocaleString('pt-BR',{minimumFractionDigits:1,maximumFractionDigits:2});
}
function getStatus(item) {
  const t = itemTotal(item), m = item.min||0;
  if (t <= 0) return 'critico';
  if (m > 0 && t <= m) return 'critico';
  if (m > 0 && t <= m*2) return 'baixo';
  return 'ok';
}
function statusLabel(s) { return {ok:'OK',baixo:'Baixo',critico:'Crítico'}[s]||s; }

// ─── SYNC ────────────────────────────────────────────────
function setSyncStatus(s, msg) {
  document.getElementById('syncDot').className='sync-dot '+s;
  document.getElementById('syncStatus').textContent=msg;
}

onValue(ref(db, DB_PATH), snap => {
  const data = snap.val();
  if (data) {
    state = {
      items:     Array.isArray(data.items)     ? data.items     : [],
      history:   Array.isArray(data.history)   ? data.history   : [],
      log:       Array.isArray(data.log)       ? data.log       : [],
      snapshots: Array.isArray(data.snapshots) ? data.snapshots : [],
      lastModified: data.lastModified || null
    };
    renderAll();
    setSyncStatus('ok','Atualizado às '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}));
  } else {
    state = { items: SEED_ITEMS.map(i=>({...i})), history:[], log:[], snapshots:[], lastModified:null };
    save().then(()=>{ renderAll(); showToast('✅ 24 matérias-primas carregadas'); });
  }
}, () => { setSyncStatus('err','Erro de conexão'); showToast('⚠️ Sem conexão com o banco'); });

async function save() {
  if (saving) return;
  saving=true; setSyncStatus('busy','Salvando...');
  try {
    await set(ref(db,DB_PATH), state);
    setSyncStatus('ok','Salvo às '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}));
  } catch(e) { setSyncStatus('err','Erro ao salvar'); showToast('⚠️ Erro ao salvar'); }
  saving=false;
}

// ─── PARSE WhatsApp ───────────────────────────────────────
function parseWA(text) {
  const lines = text.split('\n');
  const items = [];
  let date=null, time=null;
  for (let line of lines) {
    line = line.trim();
    if (!line) continue;
    const dtM = line.match(/(\d{2}\/\d{2}\/\d{4})/); if(dtM) date=dtM[1];
    const tmM = line.match(/(\d{2}:\d{2})/); if(tmM) time=tmM[1];
    // Patterns: "Sal 850kg", "Álcool ceto 173,kg", "Essência 11.200,kg", "Álcool cerais 60 litros"
    const clean = line.replace(/[*_]/g,'').trim();
    // Match: name + number + unit (kg, g, L, litros, ml, un)
    const m = clean.match(/^(.+?)\s+([\d.,]+)\s*(?:,\s*)?(kg|g\b|litros?|l\b|ml|un(?:idades?)?)/i);
    if (m) {
      const name = m[1].trim();
      const qty = parseFloat(m[2].replace(/\./g,'').replace(',','.')) || 0;
      let unit = m[3].toLowerCase();
      if (unit==='litros'||unit==='litro') unit='L';
      else if (unit==='l') unit='L';
      else if (unit==='unidades'||unit==='unidade') unit='un';
      else unit=unit.toLowerCase();
      if (name && qty > 0) items.push({name, qty, unit});
    }
    // "Mica Dourada não tem" → qty=0
    else if (/não\s+tem|nao\s+tem|zerado/i.test(clean)) {
      const nameM = clean.match(/^(.+?)\s+(?:não|nao)\s+tem/i);
      if (nameM) items.push({name:nameM[1].trim(), qty:0, unit:'kg'});
    }
  }
  return { items, date, time };
}

window.previewParse = function() {
  const text=document.getElementById('waText').value;
  if(!text.trim()){showToast('Cole uma mensagem primeiro');return;}
  const parsed=parseWA(text);
  const box=document.getElementById('parsePreview');
  if(!parsed.items.length){box.style.display='block';box.innerHTML='<span style="color:var(--danger)">Nenhum item reconhecido.</span>';return;}
  let html=`<div style="font-size:12px;color:var(--muted);margin-bottom:8px;">📋 ${parsed.items.length} itens${parsed.date?' · '+parsed.date:''}</div>`;
  for(const it of parsed.items)
    html+=`<div class="parse-row"><span class="pname">${it.name}</span><span class="pqty">${fmt(it.qty)} ${it.unit}</span></div>`;
  box.style.display='block'; box.innerHTML=html;
};

window.importData = async function() {
  const text=document.getElementById('waText').value;
  if(!text.trim()){showToast('Cole uma mensagem primeiro');return;}
  const parsed=parseWA(text);
  if(!parsed.items.length){showToast('Nenhum item reconhecido');return;}
  const local=document.getElementById('importLocal').value;
  // Save history snapshot
  if(state.items.length) {
    state.history.unshift({date:parsed.date||new Date().toLocaleDateString('pt-BR'),items:JSON.parse(JSON.stringify(state.items)),importedAt:new Date().toISOString()});
    if(state.history.length>10) state.history=state.history.slice(0,10);
  }
  // Merge with log
  for(const pi of parsed.items) {
    const ex=state.items.find(i=>i.name.toLowerCase()===pi.name.toLowerCase());
    if(ex){
      const before = itemTotal(ex);
      ex[local]=pi.qty; if(pi.unit) ex.unit=pi.unit;
      const after = itemTotal(ex);
      if(before !== after) addLog('import', ex.name, before, after, ex.unit);
    } else {
      state.items.push({name:pi.name,unit:pi.unit||'kg',caxias:0,sjm:0,galpao:0,min:0,[local]:pi.qty});
      addLog('add', pi.name, 0, pi.qty, pi.unit||'kg');
    }
  }
  await save(); renderAll();
  document.getElementById('waText').value='';
  document.getElementById('parsePreview').style.display='none';
  showToast(`✅ ${parsed.items.length} itens importados`);
  showTab('estoque', document.querySelector('.tab'));
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===0));
  document.getElementById('fabBtn').style.display='flex';
};

// ─── RENDER ──────────────────────────────────────────────
function renderAll() { renderHeader(); renderEstoque(); renderUrgent(); updateLastModBar(); }

function renderHeader() {
  const criticos=(state.items||[]).filter(i=>getStatus(i)==='critico').length;
  const b=document.getElementById('criticoBadge');
  if(criticos){b.style.display='inline-block';b.textContent=criticos+' crítico'+(criticos>1?'s':'');}
  else b.style.display='none';
}

function renderUrgent() {
  const urgent=(state.items||[]).filter(i=>itemTotal(i)===0&&(i.min||0)>0);
  const al=document.getElementById('urgentAlert'), li=document.getElementById('urgentList');
  if(!al||!li) return;
  if(!urgent.length){al.style.display='none';return;}
  al.style.display='block';
  li.innerHTML=urgent.map(i=>`<div style="font-size:13px;padding:3px 0;border-bottom:1px solid rgba(247,79,106,.15)">${i.name} <span style="color:var(--danger);font-size:11px">(zerado)</span></div>`).join('');
}

function renderEstoque() {
  if(!state.items||!state.items.length){
    document.getElementById('summaryGrid').innerHTML='';
    document.getElementById('itemList').innerHTML='<div class="empty-state">🧪 Nenhuma matéria prima.<br>Use + ou Importar.</div>';
    return;
  }
  const search=(document.getElementById('searchInput').value||'').toLowerCase();
  function dispQty(item){return activeLocalFilter==='todos'?itemTotal(item):(item[activeLocalFilter]||0);}
  const allQtys=state.items.map(i=>dispQty(i));
  const ok=state.items.filter(i=>getStatus(i)==='ok').length;
  const baixo=state.items.filter(i=>getStatus(i)==='baixo').length;
  const critico=state.items.filter(i=>getStatus(i)==='critico').length;
  const totalKg=state.items.filter(i=>i.unit==='kg'||i.unit==='g').reduce((a,b)=>a+itemTotal(b),0);
  document.getElementById('summaryGrid').innerHTML=`
    <div class="sum-card ok"><div class="label">Itens OK</div><div class="value">${ok}</div></div>
    <div class="sum-card warn"><div class="label">Baixo</div><div class="value">${baixo}</div></div>
    <div class="sum-card danger"><div class="label">Crítico</div><div class="value">${critico}</div></div>
    <div class="sum-card accent"><div class="label">Total kg</div><div class="value">${(totalKg/1000).toFixed(1)}t</div></div>`;
  const maxQ=Math.max(...allQtys,1);
  // Sort alphabetically for display (use sorted index map to preserve original idx for edit/delete)
  const sortedIndexes = state.items.map((_,i)=>i).sort((a,b)=>state.items[a].name.localeCompare(state.items[b].name,'pt-BR'));
  let html='';
  for(const idx of sortedIndexes){
    const item=state.items[idx];
    const dq=dispQty(item);
    if(search&&!item.name.toLowerCase().includes(search)) continue;
    const st=getStatus(item);
    if(activeFilter!=='todos'&&st!==activeFilter) continue;
    const minVal = item.min || 0;
    const barScale = Math.max(dq, minVal > 0 ? minVal * 2 : 1, 1);
    const pctBar = Math.min(100, Math.round((dq / barScale) * 100));
    const minMarkerPct = minVal > 0 ? Math.min(99, Math.round((minVal / barScale) * 100)) : 0;
    const fillCls=st==='ok'?'fill-ok':st==='baixo'?'fill-baixo':'fill-critico';
    const cardCls=st==='baixo'?'alert-baixo':st==='critico'?'alert-falta':'';
    const totalCls=st==='ok'?'':st==='baixo'?'baixo':'falta';
    const badgeCls='badge-'+(st==='ok'?'ok':st==='baixo'?'baixo':'critico');
    const locaisCells=['caxias','sjm','galpao'].map(l=>{
      const v=item[l]||0;
      return `<div class="local-cell"><div class="lname">${LOCAIS_LABEL[l]}</div><div class="lval${v===0?' zero':''}">${fmt(v)}</div></div>`;
    }).join('');
    html+=`<div class="item-card ${cardCls}">
      <span class="item-badge ${badgeCls}">${statusLabel(st)}</span>
      <div class="item-name">${item.name}<span class="item-unit-badge">${item.unit||'kg'}</span></div>
      <div class="locais-grid">${locaisCells}</div>
      <div class="item-total ${totalCls}">${fmt(itemTotal(item))}<span style="font-size:13px;font-weight:400;color:var(--muted);margin-left:4px">${item.unit||'kg'}</span></div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:4px">Mínimo: ${fmt(item.min||0)} ${item.unit||'kg'}</div>
      <div class="progress-bar">
        <div class="progress-fill ${fillCls}" style="width:${pctBar}%"></div>
        ${minVal>0?`<div class="progress-min-marker" style="left:${minMarkerPct}%" title="Mínimo: ${fmt(minVal)} ${item.unit||'kg'}"></div>`:''}
      </div>
      <div class="card-actions">
        <button class="card-btn edit" onclick="openModal(${idx})">✏️ Editar</button>
        <button class="card-btn del" onclick="quickDelete(${idx})">🗑 Excluir</button>
      </div>
    </div>`;
  }
  if(!html) html='<div class="empty-state">Nenhum item encontrado.</div>';
  document.getElementById('itemList').innerHTML=html;
}

function renderCritico() {
  const criticos=(state.items||[]).filter(i=>getStatus(i)==='critico');
  const baixos=(state.items||[]).filter(i=>getStatus(i)==='baixo');
  let html='';
  if(criticos.length){
    html+=`<div class="section-title">⚠️ Estoque Crítico (${criticos.length})</div>`;
    criticos.forEach(item=>{
      const locaisCells=['caxias','sjm','galpao'].map(l=>`<div class="local-cell"><div class="lname">${LOCAIS_LABEL[l]}</div><div class="lval${(item[l]||0)===0?' zero':''}">${fmt(item[l]||0)}</div></div>`).join('');
      html+=`<div class="item-card alert-falta"><span class="item-badge badge-critico">Crítico</span>
        <div class="item-name">${item.name}<span class="item-unit-badge">${item.unit||'kg'}</span></div>
        <div class="locais-grid">${locaisCells}</div>
        <div class="item-total falta">${fmt(itemTotal(item))} ${item.unit||'kg'}</div>
        <div style="font-size:11px;color:var(--muted)">Mínimo: ${fmt(item.min||0)} ${item.unit||'kg'}</div>
      </div>`;
    });
  }
  if(baixos.length){
    html+=`<div class="section-title">📉 Estoque Baixo (${baixos.length})</div>`;
    baixos.forEach(item=>{
      const locaisCells=['caxias','sjm','galpao'].map(l=>`<div class="local-cell"><div class="lname">${LOCAIS_LABEL[l]}</div><div class="lval${(item[l]||0)===0?' zero':''}">${fmt(item[l]||0)}</div></div>`).join('');
      html+=`<div class="item-card alert-baixo"><span class="item-badge badge-baixo">Baixo</span>
        <div class="item-name">${item.name}<span class="item-unit-badge">${item.unit||'kg'}</span></div>
        <div class="locais-grid">${locaisCells}</div>
        <div class="item-total baixo">${fmt(itemTotal(item))} ${item.unit||'kg'}</div>
        <div style="font-size:11px;color:var(--muted)">Mínimo: ${fmt(item.min||0)} ${item.unit||'kg'}</div>
      </div>`;
    });
  }
  if(!html) html='<div class="empty-state">✅ Nenhum item crítico ou baixo.</div>';
  document.getElementById('criticoContent').innerHTML=html;
}

async function sendWA(phone, apikey, text) {
  const encoded=encodeURIComponent(text);
  const url=`https://api.callmebot.com/whatsapp.php?phone=${phone}&text=${encoded}&apikey=${apikey}`;
  try { await fetch(url,{mode:'no-cors'}); return true; } catch(e){ return false; }
}

  if(!cfg.phone||!cfg.apikey){showToast('Configure número e apikey primeiro');return;}
  showToast('📤 Enviando teste...');
  await sendWA(cfg.phone, cfg.apikey, '✅ Teste de alerta XPRO33 Matéria Prima funcionando!');
  showToast('✅ Mensagem enviada');
};

window.sendStockAlert = async function() {
  const cfg=JSON.parse(localStorage.getItem('mp_alert_config')||'{}');
  if(!cfg.phone||!cfg.apikey){showToast('Configure número e apikey primeiro');return;}
  const criticos=(state.items||[]).filter(i=>{const t=itemTotal(i);const m=i.min||0;return m>0&&t<=m;});
  const baixos=(state.items||[]).filter(i=>{const t=itemTotal(i);const m=i.min||0;return m>0&&t>m&&t<=m*2;});
  if(!criticos.length&&!baixos.length){showToast('Nenhum item abaixo do mínimo');return;}
  let msg='🚨 *XPRO33 - Alerta Matéria Prima*\n';
  msg+=`📅 ${new Date().toLocaleDateString('pt-BR')} às ${new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}\n\n`;
  if(criticos.length){
    msg+=`❌ *CRÍTICO (${criticos.length} itens):*\n`;
    criticos.slice(0,10).forEach(i=>msg+=`• ${i.name}: ${fmt(itemTotal(i))} ${i.unit||'kg'} (mín: ${fmt(i.min||0)})\n`);
    if(criticos.length>10) msg+=`... +${criticos.length-10} outros\n`;
    msg+='\n';
  }
  if(baixos.length){
    msg+=`⚠️ *BAIXO (${baixos.length} itens):*\n`;
    baixos.slice(0,5).forEach(i=>msg+=`• ${i.name}: ${fmt(itemTotal(i))} ${i.unit||'kg'}\n`);
  }
  showToast('📤 Enviando alerta...');
  await sendWA(cfg.phone, cfg.apikey, msg);
  showToast('✅ Alerta enviado no WhatsApp');
};

async function checkAndAlert() {
  const cfg=JSON.parse(localStorage.getItem('mp_alert_config')||'{}');
  if(!cfg.phone||!cfg.apikey) return;
  const lastAlert=parseInt(localStorage.getItem('mp_last_alert')||'0');
  const now=Date.now();
  if(now-lastAlert<4*60*60*1000) return;
  const criticos=(state.items||[]).filter(i=>{const t=itemTotal(i);const m=i.min||0;return m>0&&t<=m;});
  if(!criticos.length) return;
  localStorage.setItem('mp_last_alert', now.toString());
  let msg='🚨 *XPRO33 - Estoque Crítico Matéria Prima*\n\n';
  criticos.slice(0,8).forEach(i=>msg+=`• ${i.name}: ${fmt(itemTotal(i))} ${i.unit||'kg'}\n`);
  if(criticos.length>8) msg+=`... +${criticos.length-8} outros\n`;
  await sendWA(cfg.phone, cfg.apikey, msg);
}

function renderGraficos() {
  const container=document.getElementById('chartContainer');
  if(!container) return;
  if(!state.items||!state.items.length){container.innerHTML='<div class="empty-state">Nenhum dado.</div>';return;}

  // Chart 1: Top 10 por quantidade total (kg)
  const sorted=[...state.items].sort((a,b)=>itemTotal(b)-itemTotal(a)).slice(0,10);
  const maxQ=Math.max(...sorted.map(i=>itemTotal(i)),1);
  let html=`<div class="chart-card"><div class="chart-title">📊 Top 10 por quantidade</div>`;
  sorted.forEach(item=>{
    const pct=Math.round((itemTotal(item)/maxQ)*100);
    const st=getStatus(item);
    const color=st==='ok'?'var(--ok)':st==='baixo'?'var(--warn)':'var(--danger)';
    html+=`<div class="bar-row">
      <div class="bar-label" title="${item.name}">${item.name}</div>
      <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
      <div class="bar-val">${fmt(itemTotal(item))} ${item.unit||'kg'}</div>
    </div>`;
  });
  html+='</div>';

  // Chart 2: Distribuição por local (kg apenas)
  const kgItems=state.items.filter(i=>i.unit==='kg');
  if(kgItems.length){
    const totCaxias=kgItems.reduce((a,b)=>a+(b.caxias||0),0);
    const totSjm=kgItems.reduce((a,b)=>a+(b.sjm||0),0);
    const totGalpao=kgItems.reduce((a,b)=>a+(b.galpao||0),0);
    const grand=totCaxias+totSjm+totGalpao;
    if(grand>0){
      const locData=[{label:'Caxias',val:totCaxias,color:'#4f8ef7'},{label:'SJM',val:totSjm,color:'#7c5cfc'},{label:'Galpão',val:totGalpao,color:'#4fcf8e'}].filter(d=>d.val>0);
      html+=`<div class="chart-card"><div class="chart-title">🥧 Distribuição por local (kg)</div><div class="donut-wrap">`;
      // SVG donut
      const size=130,cx=65,cy=65,r=48,inner=25;
      let svgP='',angle=0;
      locData.forEach(d=>{
        const slice=(d.val/grand)*2*Math.PI;
        const x1=cx+r*Math.sin(angle),y1=cy-r*Math.cos(angle);
        angle+=slice;
        const x2=cx+r*Math.sin(angle),y2=cy-r*Math.cos(angle);
        const xi1=cx+inner*Math.sin(angle-slice),yi1=cy-inner*Math.cos(angle-slice);
        const xi2=cx+inner*Math.sin(angle),yi2=cy-inner*Math.cos(angle);
        const large=slice>Math.PI?1:0;
        svgP+=`<path d="M${x1.toFixed(1)},${y1.toFixed(1)} A${r},${r} 0 ${large},1 ${x2.toFixed(1)},${y2.toFixed(1)} L${xi2.toFixed(1)},${yi2.toFixed(1)} A${inner},${inner} 0 ${large},0 ${xi1.toFixed(1)},${yi1.toFixed(1)} Z" fill="${d.color}" opacity="0.9"/>`;
      });
      html+=`<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${svgP}</svg>`;
      html+=`<div class="donut-legend">`;
      locData.forEach(d=>{
        const pct=Math.round((d.val/grand)*100);
        html+=`<div class="legend-item"><div class="legend-dot" style="background:${d.color}"></div><span>${d.label} <span style="color:var(--muted)">${pct}%</span></span></div>`;
      });
      html+=`</div></div></div>`;
    }
  }

  // Chart 3: Status overview
  const ok=state.items.filter(i=>getStatus(i)==='ok').length;
  const baixo=state.items.filter(i=>getStatus(i)==='baixo').length;
  const critico=state.items.filter(i=>getStatus(i)==='critico').length;
  const total=state.items.length;
  html+=`<div class="chart-card"><div class="chart-title">🚦 Status do estoque</div>`;
  [{label:'OK',val:ok,color:'var(--ok)'},{label:'Baixo',val:baixo,color:'var(--warn)'},{label:'Crítico',val:critico,color:'var(--danger)'}].forEach(d=>{
    const pct=Math.round((d.val/total)*100);
    html+=`<div class="bar-row">
      <div class="bar-label">${d.label}</div>
      <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%;background:${d.color}"></div></div>
      <div class="bar-val">${d.val} itens</div>
    </div>`;
  });
  html+='</div>';

  // Chart 4: Críticos - qtd vs mínimo
  const critList=state.items.filter(i=>getStatus(i)==='critico'&&(i.min||0)>0).slice(0,8);
  if(critList.length){
    html+=`<div class="chart-card"><div class="chart-title">⚠️ Críticos vs mínimo necessário</div>`;
    critList.forEach(item=>{
      const t=itemTotal(item), m=item.min||1;
      const pct=Math.min(100,Math.round((t/m)*100));
      html+=`<div class="bar-row">
        <div class="bar-label" title="${item.name}">${item.name}</div>
        <div class="bar-wrap" style="position:relative">
          <div class="bar-fill" style="width:${pct}%;background:var(--danger)"></div>
        </div>
        <div class="bar-val">${fmt(t)}/${fmt(m)}</div>
      </div>`;
    });
    html+='</div>';
  }

  container.innerHTML=html;
}

function renderHistory() {
  if(!state.history||!state.history.length){document.getElementById('histContent').innerHTML='<div class="empty-state">Nenhum histórico ainda.</div>';return;}
  let html='';
  // Variation report
  if(state.history.length>=1&&state.items.length){
    const prev=state.history[0];
    const gains=[],losses=[];
    for(const cur of state.items){
      const old=prev.items.find(i=>i.name===cur.name);
      if(!old) continue;
      const diff=itemTotal(cur)-itemTotal(old);
      if(diff>0) gains.push({name:cur.name,diff,unit:cur.unit||'kg'});
      if(diff<0) losses.push({name:cur.name,diff,unit:cur.unit||'kg'});
    }
    if(gains.length||losses.length){
      html+=`<div class="section-title">📊 Variação vs inventário anterior</div>`;
      gains.sort((a,b)=>b.diff-a.diff).slice(0,5).forEach(g=>{
        html+=`<div class="hist-item" style="border-left:3px solid var(--ok)"><div class="hist-title" style="color:var(--ok)">+${fmt(g.diff)} ${g.unit}</div><div class="hist-date">${g.name}</div></div>`;
      });
      losses.sort((a,b)=>a.diff-b.diff).slice(0,5).forEach(l=>{
        html+=`<div class="hist-item" style="border-left:3px solid var(--danger)"><div class="hist-title" style="color:var(--danger)">${fmt(l.diff)} ${l.unit}</div><div class="hist-date">${l.name}</div></div>`;
      });
    }
  }
  html+=`<div class="section-title">Inventários anteriores</div>`;
  for(const h of state.history){
    const dt=new Date(h.importedAt);
    const label=dt.toLocaleDateString('pt-BR')+' às '+dt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    html+=`<div class="hist-item"><div class="hist-date">Importado em ${label}</div><div class="hist-title">Inventário de ${h.date}</div><div class="hist-count">${h.items.length} itens</div></div>`;
  }
  document.getElementById('histContent').innerHTML=html;
}

// ─── MODAL ───────────────────────────────────────────────
window.updateModalTotal = function() {
  const c=parseFloat(document.getElementById('fieldCaxias').value)||0;
  const s=parseFloat(document.getElementById('fieldSjm').value)||0;
  const g=parseFloat(document.getElementById('fieldGalpao').value)||0;
  const unit=document.getElementById('fieldUnit').value||'kg';
  document.getElementById('modalTotal').textContent=fmt(c+s+g)+' '+unit;
};

window.openModal = function(idx) {
  editingIndex=(idx!==undefined)?idx:null;
  const isEdit=editingIndex!==null;
  document.getElementById('modalTitle').textContent=isEdit?'Editar item':'Nova matéria prima';
  document.getElementById('deleteBtn').style.display=isEdit?'block':'none';
  if(isEdit){
    const item=state.items[editingIndex];
    document.getElementById('fieldName').value=item.name;
    document.getElementById('fieldUnit').value=item.unit||'kg';
    document.getElementById('fieldMin').value=item.min||0;
    document.getElementById('fieldCaxias').value=item.caxias||0;
    document.getElementById('fieldSjm').value=item.sjm||0;
    document.getElementById('fieldGalpao').value=item.galpao||0;
    updateModalTotal();
  } else {
    document.getElementById('fieldName').value='';
    document.getElementById('fieldUnit').value='kg';
    document.getElementById('fieldMin').value='';
    document.getElementById('fieldCaxias').value='';
    document.getElementById('fieldSjm').value='';
    document.getElementById('fieldGalpao').value='';
    document.getElementById('modalTotal').textContent='0 kg';
  }
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('fieldName').focus(),100);
};

window.closeModal = function(){document.getElementById('modalOverlay').classList.remove('open');};
window.overlayClick = function(e){if(e.target===document.getElementById('modalOverlay'))closeModal();};

window.saveItem = async function() {
  const name=document.getElementById('fieldName').value.trim();
  const unit=document.getElementById('fieldUnit').value||'kg';
  const min=parseFloat(document.getElementById('fieldMin').value)||0;
  const caxias=parseFloat(document.getElementById('fieldCaxias').value)||0;
  const sjm=parseFloat(document.getElementById('fieldSjm').value)||0;
  const galpao=parseFloat(document.getElementById('fieldGalpao').value)||0;
  if(!name){showToast('Digite o nome');return;}
  if(editingIndex!==null){
    const before = itemTotal(state.items[editingIndex]);
    const after = caxias+sjm+galpao;
    state.items[editingIndex]={...state.items[editingIndex],name,unit,min,caxias,sjm,galpao};
    if(before !== after) addLog('edit', name, before, after, unit);
    showToast('✅ Atualizado');
  } else {
    state.items.push({name,unit,min,caxias,sjm,galpao});
    addLog('add', name, 0, caxias+sjm+galpao, unit);
    showToast('✅ Adicionado');
  }
  await save(); renderAll(); closeModal();
  checkAndAlert();
};

window.deleteItem = async function() {
  if(!confirm('Excluir "'+state.items[editingIndex].name+'"?')) return;
  state.items.splice(editingIndex,1);
  await save(); renderAll(); closeModal(); showToast('Item excluído');
};

window.quickDelete = async function(idx) {
  if(!confirm('Excluir "'+state.items[idx].name+'"?')) return;
  state.items.splice(idx,1);
  await save(); renderAll(); showToast('Item excluído');
};

// ─── EXPORT ──────────────────────────────────────────────
window.exportExcel = function() {
  if(!state.items||!state.items.length){showToast('Nenhum item para exportar');return;}
  let csv='Nome;Unidade;Caxias;SJM;Galpão;Total;Mínimo\n';
  for(const item of state.items){
    const t=itemTotal(item);
    csv+=`"${item.name}";${item.unit||'kg'};${item.caxias||0};${item.sjm||0};${item.galpao||0};${t};${item.min||0}\n`;
  }
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url;
  a.download=`MateriaPrima_${new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')}.csv`;
  a.click(); URL.revokeObjectURL(url); showToast('📊 Excel exportado');
};

window.openImportPanel = function() {
  const tab = document.getElementById('tab-importar');
  if (tab) { tab.style.display=''; }
  showTab('importar', null);
};

// ─── LOG ─────────────────────────────────────────────────
function renderLog() {
  const el = document.getElementById('logContent');
  if (!el) return;
  if (!state.log || !state.log.length) { el.innerHTML='<div class="empty-state">Nenhuma modificação registrada ainda.</div>'; return; }
  const actionLabel = { edit:'Editado', add:'Adicionado', import:'Importado', delete:'Excluído' };
  let html = `<div class="section-title">${state.log.length} modificações registradas</div>`;
  for (const entry of state.log) {
    const dt = new Date(entry.at);
    const time = dt.toLocaleDateString('pt-BR')+' '+dt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    const diff = (entry.after||0) - (entry.before||0);
    const cls = diff > 0 ? 'pos' : diff < 0 ? 'neg' : 'neu';
    const sign = diff > 0 ? '+' : '';
    const diffStr = diff !== 0 ? `${sign}${fmt(diff)} ${entry.unit||'kg'}` : '—';
    html += `<div class="log-item">
      <div class="log-info">
        <div class="log-name">${entry.name}</div>
        <div class="log-time">${time}</div>
        <div class="log-detail">${actionLabel[entry.action]||entry.action} · ${fmt(entry.before||0)} → ${fmt(entry.after||0)} ${entry.unit||'kg'}</div>
      </div>
      <div class="log-delta ${cls}">${diffStr}</div>
    </div>`;
  }
  el.innerHTML = html;
}

// ─── SNAPSHOTS ───────────────────────────────────────────
window.takeSnapshot = async function() {
  const dias=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const now=new Date();
  const label=dias[now.getDay()]+' '+now.toLocaleDateString('pt-BR')+' '+now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  if (!state.items.length) { showToast('Nenhum item para snapshot'); return; }
  if (!state.snapshots) state.snapshots = [];
  state.snapshots.unshift({
    label,
    at: new Date().toISOString(),
    items: state.items.map(i=>({name:i.name, unit:i.unit||'kg', total:itemTotal(i)}))
  });
  if (state.snapshots.length > 12) state.snapshots = state.snapshots.slice(0, 12);
  await save();
  showToast('📸 Snapshot salvo: ' + label);
  renderSnapshots();
};

window.deleteSnapshot = async function(idx) {
  if (!confirm('Excluir snapshot "'+state.snapshots[idx].label+'"?')) return;
  state.snapshots.splice(idx, 1);
  await save(); renderSnapshots(); showToast('Snapshot excluído');
};

window.renderSnapshots = function renderSnapshots() {
  const el=document.getElementById('snapshotAnalysis'); if(!el) return;
  if(!state.snapshots||!state.snapshots.length){el.innerHTML='<div class="empty-state">Nenhum snapshot ainda.<br>Tire o primeiro acima.</div>';return;}
  let html='';
  if(state.snapshots.length>=2){
    html+=`<div class="snap-card">
      <div class="snap-title" style="margin-bottom:10px">🔄 Comparar dois snapshots</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
        <div><div style="font-size:11px;color:var(--muted);margin-bottom:4px">De:</div>
          <select class="field-input" id="snapFrom" style="font-size:12px;padding:8px">
            ${state.snapshots.map((s,i)=>`<option value="${i}">${s.label}</option>`).join('')}
          </select></div>
        <div><div style="font-size:11px;color:var(--muted);margin-bottom:4px">Para:</div>
          <select class="field-input" id="snapTo" style="font-size:12px;padding:8px">
            ${state.snapshots.map((s,i)=>`<option value="${i}" ${i===1?'selected':''}>${s.label}</option>`).join('')}
          </select></div>
      </div>
      <button class="btn btn-secondary" style="margin-top:0;padding:10px" onclick="compareSnapshots()">📊 Comparar</button>
    </div>`;
    html+=`<div id="compareResult"></div>`;
  }
  html+=`<div class="section-title">📸 Snapshots salvos (${state.snapshots.length})</div>`;
  state.snapshots.forEach((snap,idx)=>{
    const dt=new Date(snap.at);
    const time=dt.toLocaleDateString('pt-BR')+' '+dt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    const totalUni=snap.items.reduce((a,b)=>a+b.total,0);
    html+=`<div class="snap-card"><div class="snap-header"><div>
      <div class="snap-title">${snap.label}</div>
      <div class="snap-date">${time} · ${snap.items.length} itens · ${fmt(totalUni)} uni</div>
    </div>
    <div style="display:flex;gap:6px;align-items:center">
      <button style="background:rgba(79,142,247,.15);border:1px solid rgba(79,142,247,.3);color:var(--accent);font-size:11px;font-weight:700;padding:5px 10px;border-radius:8px;cursor:pointer" onclick="viewSnapshot(${idx})">👁 Ver</button>
      <button class="snap-delete" onclick="deleteSnapshot(${idx})">🗑</button>
    </div></div></div>`;
  });
  el.innerHTML=html;
}

window.viewSnapshot = function(idx) {
  const snap=state.snapshots[idx];
  const dt=new Date(snap.at);
  const time=dt.toLocaleDateString('pt-BR')+' '+dt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  const totalUni=snap.items.reduce((a,b)=>a+b.total,0);
  let html=`<div class="snap-card"><div class="snap-header"><div>
    <div class="snap-title">📸 ${snap.label}</div>
    <div class="snap-date">${time} · ${snap.items.length} itens · ${fmt(totalUni)} uni total</div>
  </div><button class="snap-delete" onclick="renderSnapshots()">✕</button></div>`;
  snap.items.forEach(i=>{html+=`<div class="snap-row"><span class="sname">${i.name}</span><span class="sval" style="color:var(--accent);font-weight:700">${fmt(i.total)} uni</span></div>`;});
  html+='</div>';
  document.getElementById('snapshotAnalysis').innerHTML=html;
};

window.compareSnapshots = function() {
  const fromIdx=parseInt(document.getElementById('snapFrom').value);
  const toIdx=parseInt(document.getElementById('snapTo').value);
  if(fromIdx===toIdx){showToast('Selecione snapshots diferentes');return;}
  const older=state.snapshots[fromIdx];
  const newer=state.snapshots[toIdx];
  const daysDiff=Math.abs(Math.round((new Date(newer.at)-new Date(older.at))/(1000*60*60*24)));
  const changes=[];
  const allNames=new Set([...older.items.map(i=>i.name),...newer.items.map(i=>i.name)]);
  allNames.forEach(name=>{
    const oi=older.items.find(i=>i.name===name);
    const ni=newer.items.find(i=>i.name===name);
    const before=oi?oi.total:0, after=ni?ni.total:0, diff=after-before;
    if(diff!==0) changes.push({name,before,after,diff});
  });
  const consumed=changes.filter(c=>c.diff<0).sort((a,b)=>a.diff-b.diff);
  const replenished=changes.filter(c=>c.diff>0).sort((a,b)=>b.diff-a.diff);
  let html=`<div class="snap-card">
    <div class="snap-title">📊 ${older.label} → ${newer.label}</div>
    <div class="snap-date" style="margin-bottom:10px">${daysDiff} dia${daysDiff!==1?'s':''} · ${changes.length} itens com variação</div>`;
  if(consumed.length){
    html+=`<div style="font-size:11px;font-weight:700;color:var(--danger);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">📉 Consumido (${consumed.length})</div>`;
    consumed.forEach(c=>{html+=`<div class="snap-row"><span class="sname">${c.name}</span><span class="sval">${c.before.toLocaleString('pt-BR')}→${c.after.toLocaleString('pt-BR')}</span><span class="sdiff neg">${fmt(c.diff)}</span></div>`;});
  }
  if(replenished.length){
    html+=`<div style="font-size:11px;font-weight:700;color:var(--ok);text-transform:uppercase;letter-spacing:.5px;margin:10px 0 6px">📈 Reposto (${replenished.length})</div>`;
    replenished.forEach(c=>{html+=`<div class="snap-row"><span class="sname">${c.name}</span><span class="sval">${c.before.toLocaleString('pt-BR')}→${c.after.toLocaleString('pt-BR')}</span><span class="sdiff pos">+${fmt(c.diff)}</span></div>`;});
  }
  if(!changes.length) html+=`<div style="color:var(--muted);font-size:13px;padding:10px 0">Nenhuma variação encontrada.</div>`;
  html+='</div>';
  document.getElementById('compareResult').innerHTML=html;
};

window.showToast = function(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
};

if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});

document.getElementById('searchInput').addEventListener('input', () => renderEstoque());
